name: Bug report
description: Something is broken
labels: [bug, triage]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations: { required: true }
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Songs tab
        2. Tap "He Is Lord"
        3. ...
    validations: { required: true }
  - type: dropdown
    id: network
    attributes:
      label: Network state
      options: [Wi-Fi, Cellular (good), Cellular (2G/3G), Airplane mode / offline, Unknown]
    validations: { required: true }
  - type: dropdown
    id: role
    attributes:
      label: Role of the affected user
      options: [Member, Location leader, Committee lead, Regional coordinator, Unknown]
    validations: { required: true }
  - type: input
    id: device
    attributes:
      label: Device & OS
      placeholder: "Samsung A14, Android 13 / iPhone 12, iOS 18"
    validations: { required: true }
  - type: input
    id: version
    attributes:
      label: App version / update ID
      description: Settings → About, or the EAS update ID
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: Screenshots have no real member names or phone numbers
          required: true
